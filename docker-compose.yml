services:
  postgres:
    image: postgres:18
    container_name: ai_language_bot_postgres
    environment:
      POSTGRES_DB: ai_language_bot
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql

  redis:
    image: redis:8
    container_name: ai_language_bot_redis
    ports:
      - "6379:6379"

volumes:
  pgdata:
