services:
  postgres:
    image: postgres:18
    container_name: ai_language_bot_postgres
    environment:
      POSTGRES_DB: ai_language_bot
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql

  pgadmin:
    image: dpage/pgadmin4:9
    container_name: ai_language_bot_pgadmin
    depends_on:
      - postgres
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: "False"
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin

  redis:
    image: redis:8
    container_name: ai_language_bot_redis
    ports:
      - "6379:6379"

volumes:
  pgdata:
  pgadmin_data:
